services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Containerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_TARGET=http://backend:8000
      - VITE_TURNSTILE_SITE_KEY=${VITE_TURNSTILE_SITE_KEY:-}
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Containerfile.dev
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - /app/.venv
      - db_data:/app/data
    env_file:
      - ./.env
    environment:
      - FRONTEND_URL=http://localhost:5173
      - LOG_LEVEL=debug
    restart: unless-stopped

volumes:
  db_data:
