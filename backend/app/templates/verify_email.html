<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body style="font-family: Arial, sans-serif; padding: 20px;">
  <h2>Verify your DnD Card Maker account</h2>
  <p>Click the link below to verify your email address:</p>
  <p>
    <a href="{{ verify_url }}" style="display: inline-block; padding: 10px 20px;
       background: #48534b; color: white; text-decoration: none; border-radius: 4px;">
      Verify Email
    </a>
  </p>
  <p>Or copy and paste this URL:</p>
  <pre style="background: #f4f4f4; border: 1px solid #ddd; border-radius: 4px;
              padding: 12px 16px; font-family: monospace; font-size: 13px;
              white-space: pre-wrap; word-break: break-all; margin: 8px 0;">{{ verify_url }}</pre>
  <p>If you didn't create this account, you can ignore this email.</p>
</body>
</html>
