services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Containerfile
      args:
        - VITE_TURNSTILE_SITE_KEY=${VITE_TURNSTILE_SITE_KEY:-}
        - VITE_BASE_PATH=${VITE_BASE_PATH:-/dnd-card-maker/}
    container_name: dnd-card-maker
    ports:
      - "8001:80"
    restart: always
    environment:
      - NODE_ENV=production
    depends_on:
      backend:
        condition: service_healthy

  backend:
    build:
      context: ./backend
      dockerfile: Containerfile
    container_name: dnd-card-backend
    ports:
      - "8000:8000"
    volumes:
      - db_data:/app/data
    env_file:
      - ./.env
    restart: always
    healthcheck:
      test: ["CMD", "/app/.venv/bin/python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  db_data:
